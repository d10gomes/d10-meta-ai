version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: d10_backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    networks:
      - d10_net
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: d10_worker
    command: python -m app.infrastructure.queue.worker
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    networks:
      - d10_net
    restart: unless-stopped

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: d10_scheduler
    command: python -m app.scheduler.main
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    networks:
      - d10_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: d10_frontend
    env_file: .env
    ports:
      - "3000:3000"
    networks:
      - d10_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: d10_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - d10_net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: d10_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - d10_net
    restart: unless-stopped

networks:
  d10_net:
    driver: bridge

volumes:
  redis_data:
